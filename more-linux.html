            {"title": "Linux \u53d1\u884c\u7248\u5bf9\u6bd4\uff08\u7248\u672c\u4e8c\uff09", "icon": "\ud83d\udc27", "date": "2026-04", "desc": "\u4e3b\u6d41 Linux \u53d1\u884c\u7248\u5bf9\u6bd4\u5b8c\u6574\u7248\u3002", "tags": ["linux", "distros"], "url": "linux-distros-compare.html"}
        ];



        // 提取所有标签

        const allTags = [...new Set(articles.flatMap(a => a.tags))];

        const tagNames = {

            'suse': 'SUSE',

            'redhat': 'RedHat',

            'debian': 'Debian',

            'security': '安全',

            'network': '网络',

            'mail': '邮件',

            'diagnosis': '诊断',

            'external': '外部'

        };



        let currentFilter = 'all';

        let searchTerm = '';



        // 初始化筛选按钮

        function initFilters() {

            const btnContainer = document.getElementById('filterButtons');

            const tagCounts = {};

            articles.forEach(a => {

                a.tags.forEach(t => {

                    tagCounts[t] = (tagCounts[t] || 0) + 1;

                });

            });



            let buttonsHTML = `<button class="filter-btn active" data-filter="all">全部 <span class="count">${articles.length}</span></button>`;

            allTags.forEach(tag => {

                const count = tagCounts[tag] || 0;

                const name = tagNames[tag] || tag;

                buttonsHTML += `<button class="filter-btn" data-filter="${tag}">${name} <span class="count">${count}</span></button>`;

            });

            btnContainer.innerHTML = buttonsHTML;



            document.querySelectorAll('.filter-btn').forEach(btn => {

                btn.addEventListener('click', () => {

                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));

                    btn.classList.add('active');

                    currentFilter = btn.dataset.filter;

                    renderArticles();

                });

            });

        }



        // 渲染文章（安全方式）

        function renderArticles() {

            const grid = document.getElementById('articleGrid');

            const noResult = document.getElementById('noResult');

            const totalCount = document.getElementById('totalCount');



            const filtered = articles.filter(a => {

                const matchFilter = currentFilter === 'all' || a.tags.includes(currentFilter);

                const searchLower = searchTerm.toLowerCase();

                const matchSearch = searchTerm === '' || 

                    a.title.toLowerCase().includes(searchLower) ||

                    a.desc.toLowerCase().includes(searchLower) ||

                    (keywordMap[a.url.split('/').pop()] && keywordMap[a.url.split('/').pop()].some(k => k.toLowerCase().includes(searchLower)));

                return matchFilter && matchSearch;

            });



            totalCount.textContent = filtered.length;



            if (filtered.length === 0) {

                grid.innerHTML = '';

                noResult.style.display = 'block';

                return;

            }



            noResult.style.display = 'none';

            grid.innerHTML = '';

            

            filtered.forEach(a => {

                const card = document.createElement('a');

                card.href = a.url;

                card.className = 'article-card';

                if (a.url.startsWith('http')) {

                    card.target = '_blank';

                    card.rel = 'noopener noreferrer';

                }

                

                const header = document.createElement('div');

                header.className = 'card-header';

                

                const title = document.createElement('span');

                title.className = 'card-title';

                const iconSpan = document.createElement('span');

                iconSpan.className = 'icon';

                iconSpan.textContent = a.icon;

                title.appendChild(iconSpan);

                const titleText = document.createTextNode(a.title);

                title.appendChild(titleText);

                

                const date = document.createElement('span');

                date.className = 'card-date';

                date.textContent = a.date;

                

                header.appendChild(title);

                header.appendChild(date);

                

                const desc = document.createElement('p');

                desc.className = 'card-desc';

                desc.textContent = a.desc;

                

                const tagsDiv = document.createElement('div');

                tagsDiv.className = 'card-tags';

                a.tags.forEach(t => {

                    const tag = document.createElement('span');

                    tag.className = `tag tag-${t}`;

                    tag.textContent = (tagNames[t] || t).toUpperCase();

                    tagsDiv.appendChild(tag);

                });

                

                card.appendChild(header);

                card.appendChild(desc);

                card.appendChild(tagsDiv);

                grid.appendChild(card);

            });

        }



        // 搜索功能

        document.getElementById('searchInput').addEventListener('input', (e) => {

            searchTerm = e.target.value;

            renderArticles();

        });



        // 初始化

        initFilters();

        renderArticles();

    </script>
