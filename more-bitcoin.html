        // Count tags
        const counts = { all: articles.length, btc: 0, eth: 0, bnb: 0, analysis: 0 };
        articles.forEach(a => {
            a.tags.forEach(t => { if (counts[t] !== undefined) counts[t]++; });
        });

        // Update counts in UI
        document.getElementById('totalCount').textContent = articles.length;
        document.getElementById('btcCount').textContent = counts.btc;
        document.getElementById('ethCount').textContent = counts.eth;
        document.getElementById('bnbCount').textContent = counts.bnb;
        document.getElementById('countAll').textContent = `(${counts.all})`;
        document.getElementById('countBtc').textContent = `(${counts.btc})`;
        document.getElementById('countEth').textContent = `(${counts.eth})`;
        document.getElementById('countBnb').textContent = `(${counts.bnb})`;
        document.getElementById('countAnalysis').textContent = `(${counts.analysis})`;

        let currentFilter = 'all';
        let searchTerm = '';

        function renderArticles() {
            const grid = document.getElementById('articleGrid');
            const noResult = document.getElementById('noResult');
            
            const filtered = articles.filter(a => {
                const matchFilter = currentFilter === 'all' || a.tags.includes(currentFilter);
                const searchLower = searchTerm.toLowerCase();
                const matchSearch = searchTerm === '' || 
                    a.title.toLowerCase().includes(searchLower) ||
                    a.desc.toLowerCase().includes(searchLower) ||
                    (a.keywords && a.keywords.some(k => k.toLowerCase().includes(searchLower)));
                return matchFilter && matchSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '';
                noResult.style.display = 'block';
                return;
            }

            noResult.style.display = 'none';
            grid.innerHTML = '';
            filtered.forEach(a => {
                const card = document.createElement('a');
                card.href = a.url;
                card.className = 'article-card';
                card.target = '_blank';
                card.rel = 'noopener noreferrer';
                
                const header = document.createElement('div');
                header.className = 'card-header';
                
                const title = document.createElement('span');
                title.className = 'card-title';
                title.textContent = a.title;
                const iconSpan = document.createElement('span');
                iconSpan.className = 'icon';
                iconSpan.textContent = a.icon;
                title.prepend(iconSpan);
                
                const date = document.createElement('span');
                date.className = 'card-date';
                date.textContent = a.date;
                
                header.appendChild(title);
                header.appendChild(date);
                
                const desc = document.createElement('p');
                desc.className = 'card-desc';
                desc.textContent = a.desc;
                
                const tagsDiv = document.createElement('div');
                tagsDiv.className = 'card-tags';
                a.tags.forEach(t => {
                    const tag = document.createElement('span');
                    tag.className = `tag tag-${t}`;
                    tag.textContent = t.toUpperCase();
                    tagsDiv.appendChild(tag);
                });
                
                card.appendChild(header);
                card.appendChild(desc);
                card.appendChild(tagsDiv);
                grid.appendChild(card);
            });
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderArticles();
            });
        });

        // Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderArticles();
        });

        // Back to top button
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('backToTop');
            if (window.scrollY > 300) {
                btn.classList.add('show');
            } else {
                btn.classList.remove('show');
            }
        });

        // Initial render
        renderArticles();
    </script>
