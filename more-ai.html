            {"title": "20\u4e2a\u6700\u9760\u8c31 \u795e\u7ea7 Skill \u63a8\u8350\u699c", "icon": "\u2b50", "date": "2026-03", "desc": "ClawHub \u91cc\u7cfb\u7edf\u8bc4\u5206 >3.4 \u7684 20 \u4e2a\u795e\u7ea7 Skill \u63a8\u8350\uff0c\u6309\u529f\u80fd\u5206\u56db\u7c7b\u3002", "tags": ["skill"], "url": "skill-top20.html"},
            {"title": "EasyClaw \u2014 AI \u52a9\u624b\u4ea7\u54c1\u5168\u89e3\u6790", "icon": "\ud83e\udd16", "date": "2026-03", "desc": "\u57fa\u4e8e OpenClaw \u6846\u67b6\u7684 AI \u52a9\u624b\u4ea7\u54c1\u5bfc\u822a\uff0c\u4f01\u4e1a\u7248/\u4e2a\u4eba\u7248/\u56fd\u5185\u5916\u7248\u5168\u89e3\u6790\u3002", "tags": ["agent"], "url": "easyclaw-intro.html"}
        ];

        const allTags = [...new Set(articles.flatMap(a => a.tags))];
        const tagNames = {
            'analysis': '深度分析',
            'security': '安全警报',
            'agent': 'AI Agent',
            'contrast': '对比评测',
            'skill': 'Skill推荐'
        };

        let currentFilter = 'all';
        let searchTerm = '';

        function initFilters() {
            const btnContainer = document.getElementById('filterButtons');
            const tagCounts = {};
            articles.forEach(a => {
                a.tags.forEach(t => {
                    tagCounts[t] = (tagCounts[t] || 0) + 1;
                });
            });

            let buttonsHTML = `<button class="filter-btn active" data-filter="all">全部 <span class="count">${articles.length}</span></button>`;
            allTags.forEach(tag => {
                const count = tagCounts[tag] || 0;
                const name = tagNames[tag] || tag;
                buttonsHTML += `<button class="filter-btn" data-filter="${tag}">${name} <span class="count">${count}</span></button>`;
            });
            btnContainer.innerHTML = buttonsHTML;

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    renderArticles();
                });
            });
        }

        function renderArticles() {
            const grid = document.getElementById('articleGrid');
            const noResult = document.getElementById('noResult');
            const totalCount = document.getElementById('totalCount');

            const filtered = articles.filter(a => {
                const matchFilter = currentFilter === 'all' || a.tags.includes(currentFilter);
                const searchLower = searchTerm.toLowerCase();
                const matchSearch = searchTerm === '' || 
                    a.title.toLowerCase().includes(searchLower) ||
                    a.desc.toLowerCase().includes(searchLower) ||
                    (keywordMap[a.url.split('/').pop()] && keywordMap[a.url.split('/').pop()].some(k => k.toLowerCase().includes(searchLower)));
                return matchFilter && matchSearch;
            });

            totalCount.textContent = filtered.length;

            if (filtered.length === 0) {
                grid.innerHTML = '';
                noResult.style.display = 'block';
                return;
            }

            noResult.style.display = 'none';
            grid.innerHTML = '';
            
            filtered.forEach(a => {
                const card = document.createElement('a');
                card.href = a.url;
                card.className = 'article-card';
                if (a.url.startsWith('http') && !a.url.includes('138138100.xyz')) {
                    card.target = '_blank';
                    card.rel = 'noopener noreferrer';
                }
                
                const header = document.createElement('div');
                header.className = 'card-header';
                
                const title = document.createElement('span');
                title.className = 'card-title';
                const iconSpan = document.createElement('span');
                iconSpan.className = 'icon';
                iconSpan.textContent = a.icon;
                title.appendChild(iconSpan);
                const titleText = document.createTextNode(a.title);
                title.appendChild(titleText);
                
                const date = document.createElement('span');
                date.className = 'card-date';
                date.textContent = a.date;
                
                header.appendChild(title);
                header.appendChild(date);
                
                const desc = document.createElement('p');
                desc.className = 'card-desc';
                desc.textContent = a.desc;
                
                const tagsDiv = document.createElement('div');
                tagsDiv.className = 'card-tags';
                a.tags.forEach(t => {
                    const tag = document.createElement('span');
                    tag.className = `tag tag-${t}`;
                    tag.textContent = (tagNames[t] || t).toUpperCase();
                    tagsDiv.appendChild(tag);
                });
                
                card.appendChild(header);
                card.appendChild(desc);
                card.appendChild(tagsDiv);
                grid.appendChild(card);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderArticles();
        });

        initFilters();
        renderArticles();
    </script>
</body>
