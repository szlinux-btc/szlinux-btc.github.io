<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>szlinux-btc</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 40px 20px;
            line-height: 1.6;
        }
        .container { max-width: 700px; margin: 0 auto; }
        h1 { font-size: 2.5rem; text-align: center; margin-bottom: 50px; font-weight: 700; }
        .card {
            border: 2px solid #1a1a1a;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }
        .card:hover {
            background: #f7931a;
            border-color: #f7931a;
            color: #ffffff;
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(247,147,26,0.3);
        }
        .card-icon { font-size: 2.5rem; margin-bottom: 15px; display: block; }
        .card-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 12px; }
        .card-desc { font-size: 0.95rem; opacity: 0.85; line-height: 1.7; }
        .divider { width: 80px; height: 3px; background: #f7931a; margin: 40px auto; border-radius: 2px; }
        .links { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-bottom: 35px; }
        .link {
            color: #1a1a1a;
            text-decoration: none;
            padding: 12px 28px;
            border: 2px solid #1a1a1a;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .link:hover { background: #1a1a1a; color: #ffffff; transform: translateY(-2px); }
        .quote { text-align: center; font-size: 0.95rem; color: #666; font-style: italic; }
        @media (max-width: 480px) {
            h1 { font-size: 2rem; }
            .card { padding: 20px; }
            .card-title { font-size: 1.2rem; }
            .card-desc { font-size: 0.9rem; }
            .link { padding: 10px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👋 Hi, I'm szlinux-btc</h1>
        <div class="card">
            <span class="card-icon">🪙</span>
            <div class="card-title">大饼爱好者</div>
            <div class="card-desc">区块链信仰者 · 长期持有者<br>相信去中心化改变世界</div>
        </div>
        <div class="card">
            <span class="card-icon">🐧</span>
            <div class="card-title">Linux 狂热份子</div>
            <div class="card-desc">10 年 + Linux 经验 · 开源贡献者<br>Arch/Debian 双修 · 终端就是我的家</div>
        </div>
        <div class="card">
            <span class="card-icon">🤖</span>
            <div class="card-title">AI 学习者</div>
            <div class="card-desc">探索 AGI 边界 · 让 AI 为人类服务<br>每天学习新模型/新工具</div>
        </div>
        <div class="divider"></div>
        <div class="links">
            <a href="https://github.com/szlinux-btc" class="link" target="_blank">💼 GitHub</a>
            <a href="mailto:contact@138138100.xyz" class="link">📧 Contact</a>
        </div>
        <p class="quote">"Talk is cheap. Show me the code." — Linus Torvalds</p>
    </div>
</body>
</html>
